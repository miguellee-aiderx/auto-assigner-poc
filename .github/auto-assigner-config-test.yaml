# POC repo dry-run용 테스트 설정.
# 실제 a2-adm 팀 구조를 유지하되, miguellee-aiderx를 backend_intern으로 매핑해
# 개인 repo의 PR #1에서 Peer 리뷰어 지정 흐름을 검증합니다.

peer_pools:
  backend_intern:
    - junokim-aiderx
    - bendo-aiderx
    - sophiepark-aiderx
  frontend:
    - tonychoi-aiderx
    - zoekim-aiderx
    - wannykim-aiderx

# Code Reviewer 가중치 (14일/37PR/46건 실측 데이터 기반)
code_reviewers:
  lucaskim-aiderx: 5
  tedcho-aiderx: 4
  hanmh-aiderx: 1

# 작성자 login -> 역할 매핑.
# NOTE: miguellee-aiderx는 a2-adm에서 code_reviewer였으나,
# POC repo에서는 인턴 역할을 가정해 Peer 리뷰어 지정 흐름을 테스트합니다.
author_roles:
  miguellee-aiderx: backend_intern
  junokim-aiderx: backend_intern
  bendo-aiderx: backend_intern
  sophiepark-aiderx: backend_intern
  ianlee-aiderx: no_peer
  tonychoi-aiderx: frontend
  zoekim-aiderx: frontend
  wannykim-aiderx: regular
  lucylee-aiderx: mlops
  lylachoi-aiderx: mlops
  lucaskim-aiderx: code_reviewer
  tedcho-aiderx: code_reviewer
  hanmh-aiderx: devops

# Peer 단계를 생략하고 Code Reviewer로 직행하는 special roles.
special_roles:
  - no_peer
  - regular
  - mlops
  - code_reviewer
  - devops

# DevOps 키워드 (title/body/files에서 대소문자 구분 없이 검색)
devops_keywords:
  - ci
  - cd
  - deploy
  - deployment
  - workflow
  - docker
  - dockerfile
  - docker compose
  - docker-compose
  - compose
  - github action
  - terraform
  - kubernetes
  - k8s
  - helm
  - ansible
  - jenkins
  - argo
  - gitlab runner

# DevOps 키워드 매칭 시 Code Reviewer 후보에 추가할 사용자.
devops_candidates:
  - hanmh-aiderx

# GitHub 라벨 이름
labels:
  auto_routed: auto-routed
  skip_peer: skip-peer-review
  code_reviewer_assigned: code-reviewer-assigned

# Peer 리뷰어 지정 인원
# 2026-06-17 실측 a2-adm closed PR 17건 분석 결과,
# backend/frontend intern PR은 Peer 1명 approve 후 CR이 머지하는 케이스가
# 14/17(82%)로 압도적이었습니다.
peer_count: 1
