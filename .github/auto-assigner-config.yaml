# a2-adm 전용 리뷰어 자동 지정 설정.
# 팀 구조, 라우팅 규칙, 가중치 변경 시 이 파일만 수정하면 됩니다.

peer_pools:
  backend_intern:
    - junokim-aiderx
    - bendo-aiderx
    - sophiepark-aiderx
  frontend:
    - tonychoi-aiderx
    - zoekim-aiderx
    - wannykim-aiderx

# Code Reviewer 가중치 (150개 closed PR 실측 기반: lucaskim 73%, tedcho 25%, hanmh 1.7%)
# 루카스 대표의 최종 리뷰 의도를 반영, 운영하면서 지속 조정.
code_reviewers:
  lucaskim-aiderx: 6
  tedcho-aiderx: 3
  hanmh-aiderx: 1

# 작성자 login -> 역할 매핑.
author_roles:
  junokim-aiderx: backend_intern
  bendo-aiderx: backend_intern
  sophiepark-aiderx: backend_intern
  ianlee-aiderx: no_peer
  tonychoi-aiderx: frontend
  zoekim-aiderx: frontend
  wannykim-aiderx: regular
  lucylee-aiderx: mlops
  lylachoi-aiderx: mlops
  lucaskim-aiderx: code_reviewer
  tedcho-aiderx: code_reviewer
  hanmh-aiderx: devops

# Peer 단계를 생략하고 Code Reviewer로 직행하는 special roles.
special_roles:
  - no_peer
  - regular
  - mlops
  - code_reviewer
  - devops

# DevOps 키워드 (title/body/files에서 대소문자 구분 없이 검색)
# ci, cd는 "CI/CD" 같은 문맥을 위해 포함하나, 코드에서는 단어 경계를 고려해 false positive를 줄입니다.
devops_keywords:
  - ci
  - cd
  - deploy
  - deployment
  - workflow
  - docker
  - dockerfile
  - docker compose
  - docker-compose
  - compose
  - github action
  - terraform
  - kubernetes
  - k8s
  - helm
  - ansible
  - jenkins
  - argo
  - gitlab runner

# DevOps 키워드 매칭 시 Code Reviewer 후보에 추가할 사용자.
devops_candidates:
  - hanmh-aiderx

# GitHub 라벨 이름
labels:
  auto_routed: auto-routed
  skip_peer: skip-peer-review
  code_reviewer_assigned: code-reviewer-assigned

# Peer 리뷰어 지정 인원
# NOTE: 2026-06-17 실측 a2-adm closed PR 17건 분석 결과,
# backend/frontend intern PR은 Peer 1명 approve 후 CR이 머지하는 케이스가
# 14/17(82%)로 압도적이었습니다. 2명 모두 approve는 3건(18%)에 불과했습니다.
# peer_count=2로 라이브 시 staged workflow가 대부분 skip될 우려가 있어 1로 조정.
peer_count: 1
